name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  checks: write
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache Cargo Dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          rtk/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Check Formatting
      run: cargo fmt --manifest-path rtk/Cargo.toml --all -- --check

    - name: Clippy Linting
      run: cargo clippy --manifest-path rtk/Cargo.toml -- -D warnings

    - name: Run Unit Tests
      run: cargo test --manifest-path rtk/Cargo.toml

    - name: Security Audit
      uses: actions-rust-lang/audit@v1
      with:
        ignore: RUSTSEC-2026-0009, RUSTSEC-2025-0119, RUSTSEC-2024-0436
        workingDirectory: rtk
